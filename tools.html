<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喜成印刷｜報價工具 內測入口</title>
<style>
  :root{--bg:#0f1115;--card:#191c22;--line:#2a2e38;--ink:#eef1f6;--sub:#9aa3b2;--gold:#d8b25b;--gold2:#f0d488;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.6;padding:24px;max-width:520px;margin:0 auto}
  h1{font-size:22px;margin:8px 0 4px;letter-spacing:.5px}
  h1 .g{background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--sub);font-size:13px;margin-bottom:20px}
  a.tool{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;text-decoration:none;color:var(--ink);transition:border-color .15s}
  a.tool:hover{border-color:var(--gold)}
  a.tool .t{font-size:17px;font-weight:700;color:var(--gold2)}
  a.tool .d{font-size:13px;color:var(--sub);margin-top:4px}
  .badge{display:inline-block;background:#3a1717;border:1px solid #6a2a2a;color:#ffb4b4;font-size:12px;padding:4px 10px;border-radius:20px;margin-bottom:14px}
  .foot{text-align:center;color:var(--sub);font-size:12px;margin-top:18px}
</style>
</head>
<body>
<div class="badge">⚠ 內測版・僅供測試</div>
<h1>喜成印刷　<span class="g">報價工具</span></h1>
<div class="sub">內測入口・選一個工具進入</div>
<a class="tool" href="print.html"><div class="t">合版・獨立版 印刷報價 →</div><div class="d">選紙張＋大紙尺寸＋開數 自動落版（含放損）＋印刷＋後加工複選；紙袋含單／雙接落版</div></a>
<a class="tool" href="daigong.html"><div class="t">同行燙金・打凸 代工報價 →</div><div class="d">給印刷同業自助估價</div></a>
<a class="tool" href="cards.html"><div class="t">名片報價 →</div><div class="d">名片規格即時試算</div></a>
<a class="tool" href="bag.html"><div class="t">紙袋自助報價 →</div><div class="d">紙張＋印刷＋後加工 全自動試算</div></a>
<div class="foot">喜成印刷　燙金・模切・代工　｜　高雄</div>
</body>
</html>
